<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя Стрічка Новин</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .news-card { margin-bottom: 20px; border-radius: 10px; overflow: hidden; height: 100%; }
        .news-img { width: 100%; height: 200px; object-fit: cover; background-color: #e9ecef; }
        .card-body { display: flex; flex-direction: column; }
        .btn-read { margin-top: auto; }
    </style>
</head>
<body class="bg-light">
    <div class="container py-5">
        <h1 class="text-center mb-5">Останні Новини</h1>
        <div id="news-container" class="row">
            </div>
    </div>

    <script>
    // Ваша ссылка на CSV
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSbFfmcdU2JUcOo5qy687PbsjiAIOV8Xarp2vy0QK-IwBtVWGi7DuggMYMLsN1AteZ1SSMIQPw8Ue6Q/pub?gid=0&single=true&output=csv';

    async function loadNews() {
        try {
            const response = await fetch(csvUrl);
            const data = await response.text();
            
            // Разбиваем на строки, убираем пустые
            const rows = data.split(/\r?\n/).filter(row => row.trim() !== "");
            rows.shift(); // Удаляем шапку

            const container = document.getElementById('news-container');
            container.innerHTML = ''; 

            rows.forEach((row, index) => {
                try {
                    // Продвинутый парсер CSV: корректно обрабатывает запятые внутри кавычек
                    const cols = [];
                    let startValue = 0;
                    let inQuotes = false;

                    for (let i = 0; i < row.length; i++) {
                        if (row[i] === '"') inQuotes = !inQuotes;
                        if (row[i] === ',' && !inQuotes) {
                            cols.push(row.substring(startValue, i));
                            startValue = i + 1;
                        }
                    }
                    cols.push(row.substring(startValue));

                    // Если колонок мало, пропускаем
                    if (cols.length < 8) return;

                    const clean = (text) => text ? text.replace(/^"|"$/g, '').replace(/""/g, '"').trim() : '';

                    // Привязка к вашим колонкам:
                    const category = clean(cols[1]);
                    const title = clean(cols[4]);
                    const desc = clean(cols[6]);
                    const url = clean(cols[7]);
                    
                    // Проверяем 9-ю колонку (Raw Image), если её нет — берем из 4-й (Preview)
                    let imgUrl = '';
                    if (cols[8]) {
                        imgUrl = clean(cols[8]);
                    } else {
                        // Вытягиваем ссылку из формулы =IMAGE("url")
                        const match = cols[3].match(/https?:\/\/[^"]+/);
                        imgUrl = match ? match[0] : '';
                    }

                    if (!imgUrl || imgUrl === 'No Image') {
                        imgUrl = 'https://via.placeholder.com/400x200?text=News+Image';
                    }

                    container.innerHTML += `
                        <div class="col-md-4 mb-4">
                            <div class="card shadow-sm h-100">
                                <img src="${imgUrl}" class="card-img-top news-img" style="height:200px; object-fit:cover;" onerror="this.src='https://via.placeholder.com/400x200?text=Image+Error'">
                                <div class="card-body d-flex flex-column">
                                    <span class="badge bg-primary mb-2" style="width:fit-content;">${category}</span>
                                    <h5 class="card-title">${title}</h5>
                                    <p class="card-text text-muted small">${desc.substring(0, 150)}...</p>
                                    <div class="mt-auto">
                                        <a href="${url}" target="_blank" class="btn btn-outline-primary btn-sm w-100">Читати далі</a>
                                    </div>
                                </div>
                            </div>
                        </div>`;
                } catch (e) {
                    console.error("Ошибка в строке " + index, e);
                }
            });
        } catch (error) {
            console.error('Ошибка загрузки:', error);
        }
    }
    loadNews();
</script>
    
</body>
</html>
