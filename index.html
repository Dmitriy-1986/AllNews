<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя Стрічка Новин</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .news-card { margin-bottom: 20px; border-radius: 10px; overflow: hidden; height: 100%; }
        .news-img { width: 100%; height: 200px; object-fit: cover; background-color: #e9ecef; }
        .card-body { display: flex; flex-direction: column; }
        .btn-read { margin-top: auto; }
    </style>
</head>
<body class="bg-light">
    <div class="container py-5">
        <h1 class="text-center mb-5">Останні Новини</h1>
        <div id="news-container" class="row">
            </div>
    </div>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSbFfmcdU2JUcOo5qy687PbsjiAIOV8Xarp2vy0QK-IwBtVWGi7DuggMYMLsN1AteZ1SSMIQPw8Ue6Q/pub?gid=0&single=true&output=csv';

    async function loadNews() {
        const container = document.getElementById('news-container');
        try {
            const response = await fetch(csvUrl);
            const data = await response.text();
            
            // Розбиваємо на рядки, ігноруючи порожні
            const rows = data.split(/\r?\n/).filter(row => row.trim().length > 0).slice(1); 
            container.innerHTML = ''; 

            rows.forEach((row) => {
                try {
                    // НАДІЙНИЙ ПАРСИНГ: враховуємо коми всередині лапок
                    const cols = [];
                    let startValue = 0;
                    let inQuotes = false;
                    for (let i = 0; i < row.length; i++) {
                        if (row[i] === '"') inQuotes = !inQuotes;
                        if (row[i] === ',' && !inQuotes) {
                            cols.push(row.substring(startValue, i));
                            startValue = i + 1;
                        }
                    }
                    cols.push(row.substring(startValue));

                    const clean = (t) => t ? t.replace(/^["']+|["']+$/g, '').replace(/""/g, '"').trim() : '';

                    // Перевіряємо чи є заголовок (колонка 5, індекс 4)
                    const title = clean(cols[4]);
                    if (!title || title.toLowerCase() === 'title') return;

                    const category = clean(cols[1]) || "Новини";
                    const desc = clean(cols[6]) || "";
                    const url = clean(cols[7]) || "#";
                    
                    // Пошук зображення
                    let rawImg = clean(cols[8]); // Спробуємо колонку 9
                    if (!rawImg || !rawImg.startsWith('http')) {
                        // Якщо там порожньо, шукаємо URL у колонці 4 (індекс 3)
                        const match = (cols[3] || "").match(/https?:\/\/[^"'\s)]+/);
                        rawImg = match ? match[0] : "";
                    }

                    // Обробка HTTP та HTTPS
                    let imgUrl = rawImg;
                    if (rawImg && rawImg.startsWith('http://')) {
                        imgUrl = `https://wsrv.nl/?url=${encodeURIComponent(rawImg)}&default=https://placehold.co/600x400?text=Format+Error`;
                    }

                    if (!imgUrl) {
                        imgUrl = 'https://placehold.co/600x400/e9ecef/6c757d?text=No+Photo';
                    }

                    container.innerHTML += `
                        <div class="col-md-4 mb-4">
                            <div class="card h-100 shadow-sm border-0 news-card">
                                <img src="${imgUrl}" class="card-img-top news-img" 
                                     referrerpolicy="no-referrer"
                                     onerror="this.onerror=null;this.src='https://placehold.co/600x400/e9ecef/6c757d?text=Load+Error'">
                                <div class="card-body d-flex flex-column">
                                    <span class="badge bg-primary mb-2" style="width:fit-content; font-size: 0.7rem;">${category}</span>
                                    <h5 class="card-title h6 fw-bold">${title}</h5>
                                    <p class="card-text text-muted small">${desc.substring(0, 100)}...</p>
                                    <div class="mt-auto">
                                        <a href="${url}" target="_blank" class="btn btn-primary btn-sm w-100">Читати далі</a>
                                    </div>
                                </div>
                            </div>
                        </div>`;
                } catch (e) {
                    console.error("Помилка обробки рядка:", e);
                }
            });
        } catch (error) {
            container.innerHTML = '<p class="text-center">Не вдалося оновити стрічку. Перевірте з’єднання.</p>';
        }
    }
    loadNews();
</script>
    
</body>
</html>
