<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Останні Новини</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .news-card { transition: transform 0.2s; border: none; }
        .news-card:hover { transform: translateY(-5px); }
        .news-img { height: 200px; object-fit: cover; background-color: #e9ecef; width: 100%; }
        #category-filters { overflow-x: auto; white-space: nowrap; padding-bottom: 10px; }
        #category-filters::-webkit-scrollbar { height: 4px; }
        #category-filters::-webkit-scrollbar-thumb { background: #0d6efd; border-radius: 10px; }
        .active-cat { font-weight: bold; background-color: #0d6efd !important; color: white !important; }
        .badge { font-size: 0.75rem; }
    </style>
</head>
<body class="bg-light">

<div class="container py-5">
    <h1 class="text-center mb-4 fw-bold">Останні Новини</h1>

    <div id="category-filters" class="text-center mb-4">
        <button class="btn btn-outline-primary active-cat" onclick="filterCategory('Всі', this)">Всі</button>
    </div>

    <div id="news-container" class="row">
        <div class="text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2">Завантаження стрічки...</p>
        </div>
    </div>

    <nav class="mt-5">
        <ul id="pagination" class="pagination justify-content-center"></ul>
    </nav>
</div>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSbFfmcdU2JUcOo5qy687PbsjiAIOV8Xarp2vy0QK-IwBtVWGi7DuggMYMLsN1AteZ1SSMIQPw8Ue6Q/pub?gid=0&single=true&output=csv';
    
    // Словник для перекладу категорій (відображення в UI)
    const categoryTranslations = {
        'Всі': 'Всі',
        'general': 'Головне',
        'world': 'Світ',
        'nation': 'Україна',
        'business': 'Бізнес',
        'technology': 'Технології',
        'entertainment': 'Розваги',
        'sports': 'Спорт',
        'science': 'Наука',
        'health': 'Здоров\'я'
    };

    let allNews = [];
    let filteredNews = [];
    let currentCategory = 'Всі';
    let currentPage = 1;
    const itemsPerPage = 30;

    async function fetchData() {
        try {
            const response = await fetch(csvUrl);
            if (!response.ok) throw new Error('Мережева помилка');
            const data = await response.text();
            
            const rows = data.split(/\r?\n/).filter(row => row.trim().length > 0).slice(1);
            
            allNews = rows.map(row => {
                const cols = parseCSVRow(row);
                const title = clean(cols[4]);
                if (!title) return null;

                return {
                    category: clean(cols[1]) || "general", // Значення для логіки
                    title: title,
                    desc: clean(cols[6]) || "",
                    url: clean(cols[7]) || "#",
                    img: getImgUrl(cols)
                };
            }).filter(item => item !== null);

            createCategoryButtons();
            filterCategory('Всі');
        } catch (e) {
            console.error(e);
            document.getElementById('news-container').innerHTML = `<div class="alert alert-danger text-center">Помилка завантаження даних. Спробуйте оновити сторінку.</div>`;
        }
    }

    function parseCSVRow(row) {
        const cols = [];
        let start = 0, inQuotes = false;
        for (let i = 0; i < row.length; i++) {
            if (row[i] === '"') inQuotes = !inQuotes;
            if (row[i] === ',' && !inQuotes) {
                cols.push(row.substring(start, i));
                start = i + 1;
            }
        }
        cols.push(row.substring(start));
        return cols;
    }

    function clean(t) {
        if (!t) return '';
        return t.replace(/^"|"$/g, '').replace(/""/g, '"').trim();
    }

    function getImgUrl(cols) {
        let raw = clean(cols[8]);
        if (!raw || !raw.startsWith('http')) {
            const match = (cols[3] || "").match(/https?:\/\/[^"'\s)]+/);
            raw = match ? match[0] : "";
        }

        if (raw) {
            return `https://wsrv.nl/?url=${encodeURIComponent(raw)}&w=600&h=400&fit=cover&default=https://placehold.co/600x400?text=Format+Error`;
        }
        return 'https://placehold.co/600x400/e9ecef/6c757d?text=No+Photo';
    }

    function createCategoryButtons() {
        const categories = ['Всі', ...new Set(allNews.map(n => n.category))];
        const filterBox = document.getElementById('category-filters');
        
        filterBox.innerHTML = categories.map(cat => {
            const displayName = categoryTranslations[cat] || cat; // Використовуємо переклад
            return `<button class="btn btn-outline-primary m-1 ${cat === currentCategory ? 'active-cat' : ''}" 
                             onclick="filterCategory('${cat}', this)">${displayName}</button>`;
        }).join('');
    }

    function filterCategory(cat, btn) {
        currentCategory = cat;
        currentPage = 1;
        
        document.querySelectorAll('#category-filters .btn').forEach(b => b.classList.remove('active-cat'));
        if (btn) btn.classList.add('active-cat');

        filteredNews = (cat === 'Всі') ? allNews : allNews.filter(n => n.category === cat);
        renderNews();
    }

    function renderNews() {
        const container = document.getElementById('news-container');
        const start = (currentPage - 1) * itemsPerPage;
        const end = start + itemsPerPage;
        const pageItems = filteredNews.slice(start, end);

        if (pageItems.length === 0) {
            container.innerHTML = '<div class="text-center py-5">У цій категорії поки немає новин.</div>';
            return;
        }

        container.innerHTML = pageItems.map(item => {
            const displayCat = categoryTranslations[item.category] || item.category; // Переклад для бейджа
            return `
                <div class="col-md-4 mb-4">
                    <div class="card h-100 shadow-sm news-card">
                        <img src="${item.img}" class="card-img-top news-img" 
                             referrerpolicy="no-referrer"
                             onerror="this.onerror=null;this.src='https://placehold.co/600x400?text=Image+Error'">
                        <div class="card-body">
                            <span class="badge bg-primary mb-2">${displayCat}</span>
                            <h5 class="card-title h6 fw-bold text-dark">${item.title}</h5>
                            <p class="card-text text-muted small">${item.desc.substring(0, 90)}...</p>
                            <a href="${item.url}" target="_blank" class="btn btn-primary btn-sm w-100 mt-auto">Читати далі</a>
                        </div>
                    </div>
                </div>
            `;
        }).join('');

        renderPagination();
        window.scrollTo(0, 0);
    }

    function renderPagination() {
        const totalPages = Math.ceil(filteredNews.length / itemsPerPage);
        const nav = document.getElementById('pagination');
        nav.innerHTML = '';

        if (totalPages <= 1) return;

        for (let i = 1; i <= totalPages; i++) {
            nav.innerHTML += `
                <li class="page-item ${i === currentPage ? 'active' : ''}">
                    <a class="page-link" href="javascript:void(0)" onclick="changePage(${i})">${i}</a>
                </li>`;
        }
    }

    function changePage(page) {
        currentPage = page;
        renderNews();
    }

    fetchData();
</script>

</body>
</html>
