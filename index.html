<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя Стрічка Новин</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .news-card { margin-bottom: 20px; border-radius: 10px; overflow: hidden; height: 100%; }
        .news-img { width: 100%; height: 200px; object-fit: cover; background-color: #e9ecef; }
        .card-body { display: flex; flex-direction: column; }
        .btn-read { margin-top: auto; }
    </style>
</head>
<body class="bg-light">
    <div class="container py-5">
        <h1 class="text-center mb-5">Останні Новини</h1>
        <div id="news-container" class="row">
            </div>
    </div>

   <script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSbFfmcdU2JUcOo5qy687PbsjiAIOV8Xarp2vy0QK-IwBtVWGi7DuggMYMLsN1AteZ1SSMIQPw8Ue6Q/pub?gid=0&single=true&output=csv';

    async function loadNews() {
        const container = document.getElementById('news-container');
        try {
            const response = await fetch(csvUrl);
            const data = await response.text();
            
            // Разбиваем на строки и убираем пустые
            const rows = data.split(/\r?\n/).filter(row => row.trim() !== "").slice(1); 
            container.innerHTML = ''; 

            rows.forEach((row, index) => {
                try {
                    // Надежный парсинг CSV (учитываем запятые в кавычках)
                    const cols = row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
                    
                    // Если колонок меньше 5 или нет заголовка — это "битая" строка, пропускаем
                    if (!cols || cols.length < 5 || !cols[4]) return;

                    const clean = (t) => t ? t.replace(/^["']+|["']+$/g, '').trim() : '';

                    const category = clean(cols[1]) || "Новини";
                    const title = clean(cols[4]);
                    const desc = clean(cols[6]) || "";
                    const url = clean(cols[7]) || "#";
                    
                    // Ищем ссылку на фото (в 9-й или 4-й колонке)
                    let rawImg = clean(cols[8]);
                    if (!rawImg || !rawImg.startsWith('http')) {
                        const match = (cols[3] || "").match(/https?:\/\/[^"'\s)]+/);
                        rawImg = match ? match[0] : "";
                    }

                    // ФИКС КАРТИНОК: если ссылка http, пропускаем через прокси для https
                    let imgUrl = rawImg;
                    if (rawImg && rawImg.startsWith('http://')) {
                        imgUrl = `https://wsrv.nl/?url=${encodeURIComponent(rawImg)}`;
                    }

                    // Заглушка, если фото совсем нет
                    if (!imgUrl) {
                        imgUrl = 'https://placehold.co/600x400/e9ecef/6c757d?text=No+Photo';
                    }

                    container.innerHTML += `
                        <div class="col-md-4 mb-4">
                            <div class="card h-100 shadow-sm border-0">
                                <img src="${imgUrl}" class="card-img-top" 
                                     style="height:200px; object-fit:cover;"
                                     referrerpolicy="no-referrer"
                                     onerror="this.onerror=null;this.src='https://placehold.co/600x400/e9ecef/6c757d?text=Image+Error'">
                                <div class="card-body d-flex flex-column">
                                    <span class="badge bg-primary mb-2" style="width:fit-content;">${category}</span>
                                    <h5 class="card-title h6 fw-bold">${title}</h5>
                                    <p class="card-text text-muted small">${desc.substring(0, 100)}...</p>
                                    <div class="mt-auto">
                                        <a href="${url}" target="_blank" class="btn btn-primary btn-sm w-100">Читати далі</a>
                                    </div>
                                </div>
                            </div>
                        </div>`;
                } catch (rowErr) {
                    console.warn("Пропущена строка из-за ошибки данных:", rowErr);
                }
            });

        } catch (error) {
            console.error('Ошибка загрузки данных:', error);
            container.innerHTML = '<p class="text-center">Помилка завантаження новин.</p>';
        }
    }
    loadNews();
</script>
    
</body>
</html>
