<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новини з пагінацією</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .news-card { transition: transform 0.2s; }
        .news-card:hover { transform: translateY(-5px); }
        .news-img { height: 200px; object-fit: cover; background-color: #e9ecef; }
        #category-filters .btn { margin-right: 5px; margin-bottom: 5px; }
        .active-cat { font-weight: bold; border: 2px solid #0d6efd !important; }
    </style>
</head>
<body class="bg-light">

<div class="container py-5">
    <h1 class="text-center mb-4">Останні Новини</h1>

    <div id="category-filters" class="text-center mb-4">
        <button class="btn btn-outline-primary active-cat" onclick="filterCategory('Всі')">Всі</button>
        </div>

    <div id="news-container" class="row">
        <div class="text-center">Завантаження...</div>
    </div>

    <nav class="mt-5">
        <ul id="pagination" class="pagination justify-content-center"></ul>
    </nav>
</div>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSbFfmcdU2JUcOo5qy687PbsjiAIOV8Xarp2vy0QK-IwBtVWGi7DuggMYMLsN1AteZ1SSMIQPw8Ue6Q/pub?gid=0&single=true&output=csv';
    
    let allNews = [];
    let filteredNews = [];
    let currentCategory = 'Всі';
    let currentPage = 1;
    const itemsPerPage = 30;

    async function fetchData() {
        try {
            const response = await fetch(csvUrl);
            const data = await response.text();
            const rows = data.split(/\r?\n/).filter(row => row.trim().length > 0).slice(1);
            
            allNews = rows.map(row => {
                const cols = parseCSVRow(row);
                return {
                    category: clean(cols[1]) || "Новини",
                    title: clean(cols[4]),
                    desc: clean(cols[6]) || "",
                    url: clean(cols[7]) || "#",
                    img: getImgUrl(cols)
                };
            }).filter(item => item.title); // Убираем пустые

            createCategoryButtons();
            filterCategory('Всі');
        } catch (e) {
            console.error(e);
            document.getElementById('news-container').innerHTML = "Помилка завантаження.";
        }
    }

    function parseCSVRow(row) {
        const cols = [];
        let start = 0, inQuotes = false;
        for (let i = 0; i < row.length; i++) {
            if (row[i] === '"') inQuotes = !inQuotes;
            if (row[i] === ',' && !inQuotes) {
                cols.push(row.substring(start, i));
                start = i + 1;
            }
        }
        cols.push(row.substring(start));
        return cols;
    }

    function clean(t) {
        return t ? t.replace(/^["']+|["']+$/g, '').replace(/""/g, '"').trim() : '';
    }

    function getImgUrl(cols) {
        let raw = clean(cols[8]);
        if (!raw || !raw.startsWith('http')) {
            const match = (cols[3] || "").match(/https?:\/\/[^"'\s)]+/);
            raw = match ? match[0] : "";
        }
        if (raw && raw.startsWith('http://')) {
            return `https://wsrv.nl/?url=${encodeURIComponent(raw)}`;
        }
        return raw || 'https://placehold.co/600x400?text=No+Photo';
    }

    function createCategoryButtons() {
        const categories = ['Всі', ...new Set(allNews.map(n => n.category))];
        const filterBox = document.getElementById('category-filters');
        filterBox.innerHTML = categories.map(cat => 
            `<button class="btn btn-outline-primary ${cat === 'Всі' ? 'active-cat' : ''}" 
                     onclick="filterCategory('${cat}', this)">${cat}</button>`
        ).join('');
    }

    function filterCategory(cat, btn) {
        currentCategory = cat;
        currentPage = 1;
        
        // Визуальное переключение кнопок
        document.querySelectorAll('#category-filters .btn').forEach(b => b.classList.remove('active-cat'));
        if(btn) btn.classList.add('active-cat');

        filteredNews = (cat === 'Всі') ? allNews : allNews.filter(n => n.category === cat);
        renderNews();
    }

    function renderNews() {
        const container = document.getElementById('news-container');
        const start = (currentPage - 1) * itemsPerPage;
        const end = start + itemsPerPage;
        const pageItems = filteredNews.slice(start, end);

        container.innerHTML = pageItems.map(item => `
            <div class="col-md-4 mb-4">
                <div class="card h-100 shadow-sm border-0 news-card">
                    <img src="${item.img}" class="card-img-top news-img" referrerpolicy="no-referrer"
                         onerror="this.onerror=null;this.src='https://placehold.co/600x400?text=Error'">
                    <div class="card-body">
                        <span class="badge bg-primary mb-2" style="width:fit-content;">${item.category}</span>
                        <h5 class="card-title h6 fw-bold">${item.title}</h5>
                        <p class="card-text text-muted small">${item.desc.substring(0, 80)}...</p>
                        <a href="${item.url}" target="_blank" class="btn btn-primary btn-sm mt-auto">Читати далі</a>
                    </div>
                </div>
            </div>
        `).join('');

        renderPagination();
        window.scrollTo(0, 0);
    }

    function renderPagination() {
        const totalPages = Math.ceil(filteredNews.length / itemsPerPage);
        const nav = document.getElementById('pagination');
        nav.innerHTML = '';

        if (totalPages <= 1) return;

        for (let i = 1; i <= totalPages; i++) {
            nav.innerHTML += `
                <li class="page-item ${i === currentPage ? 'active' : ''}">
                    <a class="page-link" href="#" onclick="changePage(${i})">${i}</a>
                </li>`;
        }
    }

    function changePage(page) {
        currentPage = page;
        renderNews();
    }

    fetchData();
</script>

</body>
</html>
